# Optional language runtime images for assignment code execution.
# Pull images: docker compose -f docker-compose.executor.yml pull
# Enable in API: EXECUTOR_ENABLED=true

services:
  executor-cpp:
    image: gcc:12
    profiles: [executor]
    command: ['true']

  executor-python:
    image: python:3.11-slim
    profiles: [executor]
    command: ['true']

  executor-java:
    image: eclipse-temurin:17-jdk
    profiles: [executor]
    command: ['true']

  executor-node:
    image: node:20-alpine
    profiles: [executor]
    command: ['true']

  executor-go:
    image: golang:1.21-alpine
    profiles: [executor]
    command: ['true']
